{% extends 'base.html' %}
{% block title %}{{ super() }} - Admin{% endblock %}

{% block content %}
<div class="container">
    <h2>Admin Settings</h2>

    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ 'success' if category == 'message' else category }}">
        {{ message }}
    </div>
    {% endfor %}

    <form action="{{ url_for('admin') }}" method="post">
        <table class="table table-condensed">
            <tr>
                <td><label for="sitename">Site Name</label></td>
                <td><input class="form-control" type="text" id="sitename"
                           name="sitename" value="{{ sitename }}" /></td>
            </tr>
            <tr>
                <td><label for="new_password">New Password</label></td>
                <td><input class="form-control" type="password"
                           id="new_password" name="new_password" /></td>
            </tr>
        </table>
        <input class="btn btn-default" type="submit" value="Save" />
    </form>
</div>
{% endblock %}
